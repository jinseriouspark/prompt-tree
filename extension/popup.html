<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        margin: 0;
        width: 260px;
        font: 14px/1.5 -apple-system, "Apple SD Gothic Neo", "Segoe UI", sans-serif;
        color: #14130f;
        background: #faf8f3;
        padding: 16px;
      }
      h1 { font-size: 16px; margin: 0 0 2px; font-weight: 300; }
      h1 b { font-weight: 800; }
      .sub { color: #6f6a60; font-size: 11px; margin: 0 0 12px; }
      .emoji { font-size: 56px; text-align: center; margin: 4px 0; }
      .name { font-weight: 800; text-align: center; }
      .bar { height: 10px; background: #ece8dd; border-radius: 999px; overflow: hidden; margin: 10px 0 6px; }
      .fill { height: 100%; border-radius: 999px; transition: width .5s; }
      .stats { display: flex; justify-content: space-between; color: #6f6a60; font-size: 12px; }
      button {
        width: 100%; margin-top: 14px; padding: 8px;
        border: 1px solid #e7e3d8; background: #fff; color: #6f6a60;
        border-radius: 999px; cursor: pointer; font: inherit;
      }
      button:hover { color: #14130f; }
      .hint { margin: 12px 0 0; font-size: 11px; color: #b8b2a4; text-align: center; }
    </style>
  </head>
  <body>
    <h1>프롬프트 <b>나무</b> Pro</h1>
    <p class="sub">ChatGPT·Claude에서 자동으로 자랍니다</p>
    <div class="emoji" id="emoji">🌿</div>
    <div class="name" id="name">평범한 나무</div>
    <div class="bar"><div class="fill" id="fill"></div></div>
    <div class="stats">
      <span>생명력 <b id="h">50</b>/100</span>
      <span>🌱 <b id="p">0</b> · 🔥 <span id="s">0</span>일</span>
    </div>
    <button id="reset" type="button">정원 초기화</button>
    <p class="hint">입력은 기기 안에서만 분석됩니다.</p>
    <script src="engine.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
