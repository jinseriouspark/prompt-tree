name: Deploy to GitHub Pages

# 정적 사이트(빌드 불필요)를 GitHub Pages 로 배포한다.
# main 에 푸시되거나 수동 실행(workflow_dispatch) 시 동작.
# 사용 전: 저장소 Settings → Pages → Source 를 "GitHub Actions" 로 설정.

on:
  push:
    branches: [main, claude/lucid-meitner-gnll5u]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 동시 배포 1개만 (진행 중인 건 취소하지 않고 큐잉)
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # 정적 사이트 루트. 확장/문서도 같이 올라가지만 무해함.
          path: "."

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
